name: iOS Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test PixelCamera
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode 26
      run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
      
    - name: Run Unit Tests
      run: |
        xcodebuild test \
          -project PixelCamera.xcodeproj \
          -scheme PixelCamera \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=26.0' \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty
      continue-on-error: true
      
    - name: Run UI Tests
      run: |
        xcodebuild test \
          -project PixelCamera.xcodeproj \
          -scheme PixelCamera \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=26.0' \
          -only-testing:PixelCameraUITests \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty
      continue-on-error: true
