name: iOS Build + IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build PixelCamera
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Show available Xcode versions
      run: |
        ls /Applications | grep Xcode || true
        xcode-select -p || true
        xcodebuild -version || true
      
    - name: Build unsigned .app for device (arm64)
      run: |
        set -x
        xcodebuild clean build \
          -project PixelCamera.xcodeproj \
          -scheme PixelCamera \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          ARCHS=arm64 \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          EXPANDED_CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          | tee build.log | xcpretty || true
        echo "=== Build log tail ==="
        tail -n 100 build.log || true
          
    - name: Package IPA with ad-hoc signing
      run: |
        set -x
        mkdir -p Payload
        APP_PATH=$(find build -name "PixelCamera.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: PixelCamera.app not found"
          find build -type d -name "*.app" || true
          exit 1
        fi
        echo "Found app: $APP_PATH"
        cp -R "$APP_PATH" Payload/
        
        # Ensure executable permissions
        chmod +x Payload/PixelCamera.app/PixelCamera
        
        # Ad-hoc sign for sideloading compatibility
        codesign --force --deep --sign - Payload/PixelCamera.app
        
        # Verify signature
        codesign -dv Payload/PixelCamera.app || true
        
        # Create IPA
        zip -r PixelCamera-sideload.ipa Payload
        rm -rf Payload
        ls -lh PixelCamera-sideload.ipa
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: PixelCamera-sideload-ipa
        path: PixelCamera-sideload.ipa
        retention-days: 30
        
    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7
