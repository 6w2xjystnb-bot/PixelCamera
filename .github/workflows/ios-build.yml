name: iOS Build + IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build PixelCamera
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Show environment
      run: |
        xcode-select -p
        xcodebuild -version
        ls /Applications | grep Xcode || true
      
    - name: List project schemes
      continue-on-error: true
      run: xcodebuild -project PixelCamera.xcodeproj -list
      
    - name: Build for Simulator (validation)
      continue-on-error: true
      run: |
        xcodebuild clean build \
          -project PixelCamera.xcodeproj \
          -scheme PixelCamera \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          CODE_SIGNING_ALLOWED=NO \
          > sim.log 2>&1 || true
        echo "========== SIMULATOR BUILD LOG =========="
        cat sim.log || true
        echo "========================================="
          
    - name: Build unsigned .app for device
      continue-on-error: true
      run: |
        xcodebuild clean build \
          -project PixelCamera.xcodeproj \
          -scheme PixelCamera \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          ARCHS=arm64 \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          EXPANDED_CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          > build.log 2>&1 || true
        echo "========== DEVICE BUILD LOG =========="
        cat build.log || true
        echo "======================================"
          
    - name: Package IPA
      continue-on-error: true
      run: |
        mkdir -p Payload
        APP_PATH=$(find build -name "PixelCamera.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: PixelCamera.app not found"
          find build -type d -name "*.app" || true
          echo "Creating dummy IPA for log upload..."
          touch PixelCamera-sideload.ipa
        else
          echo "Found app: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          chmod +x Payload/PixelCamera.app/PixelCamera
          codesign --force --deep --sign - Payload/PixelCamera.app || true
          zip -r PixelCamera-sideload.ipa Payload
          rm -rf Payload
          ls -lh PixelCamera-sideload.ipa
        fi
        
    - name: Upload IPA
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: PixelCamera-sideload-ipa
        path: PixelCamera-sideload.ipa
        retention-days: 30
        
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: "*.log"
        retention-days: 7
